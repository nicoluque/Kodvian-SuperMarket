version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: kodvian-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-KodvianSuperMarket}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-KodvianSuperMarket}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kodvian-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-KodvianSuperMarket};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Key: ${JWT_KEY:-change-me-in-production-very-long-key}
      App__StoragePath: /storage
      App__BackupPath: /backups
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - api_storage:/storage
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kodvian-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  db_data:
  api_storage:
  backups:
